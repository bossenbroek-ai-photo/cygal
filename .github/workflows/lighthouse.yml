name: Lighthouse
on: [push]
jobs:
  lighthouseci:
    runs-on: ubuntu-latest
    steps:
      - name: Install packages
        run: |
          lsb_release -a
          sudo apt-get update
          sudo mkdir -p /etc/apt/sources.list.d/
          sudo mkdir -p /etc/apt/preferences.d/
          echo "deb http://deb.debian.org/debian buster main" | sudo tee -a /etc/apt/sources.list
          echo "deb http://deb.debian.org/debian buster-updates main"  | sudo tee -a /etc/apt/sources.list
          echo "deb http://deb.debian.org/debian-security buster-updates main" | sudo tee -a /etc/apt/sources.list
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys DCC9EFBF77E11517
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 648ACFD622F3D138
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys AA8E81B4331F7F50
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 112695A0E562B32A
          printf "Package: *\nPin: release a=eoan\nPin-Priority: 500\n" | sudo tee -a /etc/apt/preferences.d/chromium.pref
          printf "Package: *\nPin: origin \"deb.debian.org\"\nPin-Priority: 300\n" | sudo tee -a /etc/apt/preferences.d/chromium.pref
          printf "Package: chromium*\nPin: origin \"deb.debian.org\"\nPin-Priority: 700" | sudo tee -a /etc/apt/preferences.d/chromium.pref
          sudo apt update
          sudo apt install chromium
      - name: Run headless chromium as test
        run:
          which chromium
          /usr/bin/chromium --no-sandbox  --headless --disable-gpu &
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 18
          cache: yarn
      - name: cygal yarn install and build
        run: |
          cd cygal && yarn install && yarn build
      - name: Install lighthouse and run
        run: |
          yarn global add lighthouse@9.6.1 @lhci/cli@0.8.2
          cd cygal && export LIGHTHOUSE_CHROMIUM_PATH=/usr/bin/chromium; lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
