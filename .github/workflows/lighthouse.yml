name: Lighthouse
on: [push]
jobs:
  lighthouseci:
    runs-on: ubuntu-latest
    steps:
      - name: Install packages
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes wget chromium # Install to get all dependencies
          sudo apt-get remove --assume-yes chromium-browser # Remove to remove snap version
          lsb_release -a
          wget http://ftp.us.debian.org/debian/pool/main/c/chromium/chromium_101.0.4951.64-1_amd64.deb
          sudo dpkg -i chromium_101.0.4951.64-1_amd64.deb
          sudo apt -y -f install
      - name: Run headless chromium as test
        run:
          which chromium-browser
          /usr/bin/chromium-browser --no-sandbox  --headless --disable-gpu &
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: 18
          cache: yarn
      - name: cygal yarn install and build
        run: |
          cd cygal && yarn install && yarn build
      - name: Install lighthouse and run
        run: |
          yarn global add lighthouse@9.6.1 @lhci/cli@0.8.2
          cd cygal && export LIGHTHOUSE_CHROMIUM_PATH=/usr/bin/chromium-browser; lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
